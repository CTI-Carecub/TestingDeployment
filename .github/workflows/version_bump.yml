name: Bump Version and Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine bump type
        id: bump
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"

          if [[ "$LABELS" == *"MAJOR"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"MINOR"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Get latest version
        id: version
        run: |
          git fetch --tags

          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          echo "latest=$LATEST_TAG"
          echo "latest=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next
        env:
          BUMP: ${{ steps.bump.outputs.type }}
          CURRENT: ${{ steps.version.outputs.latest }}
        run: |
          VERSION=${CURRENT#v}

          NEXT=$(npx semver $VERSION -i $BUMP)

          TAG="v$NEXT"

          echo "next=$TAG"
          echo "next=$TAG" >> $GITHUB_OUTPUT

      - name: Update package.json
        env:
          TAG: ${{ steps.next.outputs.next }}
        run: |
          VERSION=${TAG#v}

          npm version $VERSION --no-git-tag-version

      - name: Commit version bump
        env:
          TAG: ${{ steps.next.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json || true
          git commit -m "chore: bump version to $TAG [skip ci]"

          git tag $TAG

          git push origin main
          git push origin $TAG

      - name: Sync develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge origin/main -m "chore: sync main $TAG into develop [skip ci]"
          git push origin develop