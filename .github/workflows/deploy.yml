name: Bump Version and Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: develop-branch-sync
  cancel-in-progress: false

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine Bump Type
        id: bump_type
        env:
          HAS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'MAJOR') }}
          HAS_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'MINOR') }}
          HAS_PATCH: ${{ contains(github.event.pull_request.labels.*.name, 'PATCH') }}
        run: |
          if [[ "$HAS_MAJOR" == "true" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$HAS_MINOR" == "true" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$HAS_PATCH" == "true" ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "No version label found. Defaulting to patch."
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump Version in package.json
        if: steps.bump_type.outputs.type != ''
        env:
          BUMP_TYPE: ${{ steps.bump_type.outputs.type }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # ใช้ npm version เพื่ออัปเดตไฟล์และสร้าง commit/tag อัตโนมัติ
          NEW_VERSION=$(npm version "$BUMP_TYPE" -m "chore: bump version to %s [skip ci]")
          echo "new_tag=$NEW_VERSION" >> $GITHUB_OUTPUT

          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag exists. Removing old tag..."
            git tag -d "$NEW_VERSION" || true
            git push origin ":refs/tags/$NEW_VERSION" || true
          fi

          # Push ทั้ง commit และ tag กลับไปที่ main
          git push origin main --follow-tags
        id: npm_bump

      - name: Back-merge main into develop
        if: steps.bump_type.outputs.type != ''
        env:
          NEW_TAG: ${{ steps.npm_bump.outputs.new_tag }}
        run: |
          # ดึงข้อมูลล่าสุดและสลับไป branch develop
          git fetch origin develop
          git checkout develop

          # Merge main เข้าสู่ develop (ใช้ --no-ff เพื่อรักษาประวัติ หรือปกติก็พอ)
          # ใช้ -m เพื่อใส่ message และป้องกันการเปิด editor ค้างไว้
          git merge main -m "chore: sync version $NEW_TAG back to develop [skip ci]"

          # Push กลับไปที่ develop
          git push origin develop