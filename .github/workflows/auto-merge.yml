name: Auto Merge to Develop

on:
  pull_request:
    types: [labeled]
    branches:
      - develop

concurrency:
  group: develop-branch-sync
  cancel-in-progress: false

jobs:
  auto-merge:
    if: github.event.label.name == 'ready to merge' && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Attempt to Merge PR
        id: merge_step
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "### 🚀 Auto Merge Status" >> $GITHUB_STEP_SUMMARY

          # 1. Attempt merge
          MERGE_OUTPUT=$(gh pr merge "$PR_NUMBER" --merge 2>&1)
          MERGE_EXIT_CODE=$?

          if [ "$MERGE_EXIT_CODE" -eq 0 ]; then
            echo "✅ PR #$PR_NUMBER merged successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Merge Failed!**" >> $GITHUB_STEP_SUMMARY
            echo "> **Reason:** $MERGE_OUTPUT" >> $GITHUB_STEP_SUMMARY

            echo "#### 🔍 Detailed Checks:" >> $GITHUB_STEP_SUMMARY
            
            # Use || true to ensure the script doesn't crash if diagnostic data is missing
            gh pr view "$PR_NUMBER" --json reviewDecision,statusCheckRollup > pr_status.json || echo "{}" > pr_status.json
            
            DECISION=$(jq -r '.reviewDecision // "N/A"' pr_status.json)
            
            # Improved JQ to handle empty or missing rollup contexts gracefully
            CHECKS=$(jq -r '.statusCheckRollup.contexts[]? | "* \(.context // .name): \(.conclusion // .state)"' pr_status.json 2>/dev/null || echo "No checks found")

            echo "* **Review Status:** $DECISION" >> $GITHUB_STEP_SUMMARY
            echo "* **CI Checks:**" >> $GITHUB_STEP_SUMMARY
            echo "$CHECKS" >> $GITHUB_STEP_SUMMARY

            # 2. MANDATORY: Remove label so the user knows they must re-trigger
            echo "Removing 'ready to merge' label..."
            gh pr edit "$PR_NUMBER" --remove-label "ready to merge" || echo "Warning: Could not remove label."

            # 3. Exit with error so the Action UI shows a red X
            exit 1
          fi

      - name: Upload PR Status JSON
        if: always()
        uses: actions/upload-artifact@v6
        continue-on-error: true
        with:
          name: pr-status-debug-info
          path: pr_status.json
          if-no-files-found: ignore
          retention-days: 5