name: Auto Merge to Develop

on:
  pull_request:
    types: [labeled]
    branches:
      - develop

concurrency:
  group: develop-branch-sync
  cancel-in-progress: false

jobs:
  auto-merge:
    # ✅ Fixed: wrapped conditions in ${{ }} expression syntax
    if: ${{ github.event.label.name == 'ready to merge' && github.event.pull_request.state == 'open' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Attempt to Merge PR
        id: merge_step
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          echo "### 🚀 Auto Merge Status" >> $GITHUB_STEP_SUMMARY

          # ✅ Capture BOTH stdout and stderr
          MERGE_OUTPUT=$(gh pr merge $PR_NUMBER --merge 2>&1)
          MERGE_EXIT_CODE=$?

          if [ $MERGE_EXIT_CODE -eq 0 ]; then
            echo "✅ PR #$PR_NUMBER merged successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Merge Failed!**" >> $GITHUB_STEP_SUMMARY
            echo "> **Reason:** $MERGE_OUTPUT" >> $GITHUB_STEP_SUMMARY

            echo "#### 🔍 Detailed Checks:" >> $GITHUB_STEP_SUMMARY
            gh pr view $PR_NUMBER --json reviewDecision,statusCheckRollup > pr_status.json

            DECISION=$(jq -r '.reviewDecision' pr_status.json)
            CHECKS=$(jq -r '.statusCheckRollup[] | "* \(.name): \(.conclusion)"' pr_status.json 2>/dev/null || echo "No checks found")

            echo "* **Review Status:** $DECISION (Needs 'APPROVED')" >> $GITHUB_STEP_SUMMARY
            echo "* **CI Checks:**" >> $GITHUB_STEP_SUMMARY
            echo "$CHECKS" >> $GITHUB_STEP_SUMMARY

            gh pr edit $PR_NUMBER --remove-label "ready to merge"

            exit 1
          fi